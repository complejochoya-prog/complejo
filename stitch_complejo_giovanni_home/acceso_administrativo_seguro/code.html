<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Acceso Administrativo Seguro - Complejo Giovanni</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f2b90d",
                        "background-light": "#f8f8f5",
                        "background-dark": "#020617", // Overriding slightly for Slate-950 aesthetic as requested
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
<!-- Background Decoration Elements -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px]"></div>
<main class="w-full max-w-[500px] z-10">
<!-- Glassmorphism Card -->
<div class="bg-white/5 dark:bg-slate-900/40 backdrop-blur-2xl border border-slate-200/10 dark:border-slate-800/50 rounded-xl p-8 md:p-12 shadow-2xl flex flex-col items-center">
<!-- Logo Section -->
<div class="mb-10 text-center">
<div class="w-20 h-20 bg-primary/10 rounded-full flex items-center justify-center mb-6 mx-auto border border-primary/20">
<span class="material-symbols-outlined text-primary text-4xl">shield_person</span>
</div>
<h1 class="text-3xl md:text-4xl font-extrabold tracking-tighter text-slate-900 dark:text-white uppercase">
                    COMPLEJO <span class="text-primary">GIOVANNI</span>
</h1>
<p class="mt-2 text-slate-500 dark:text-slate-400 font-medium uppercase tracking-widest text-xs">Acceso Administrativo</p>
</div>
<!-- Login Form -->
<form class="w-full space-y-6">
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Email de Administrador</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">alternate_email</span>
<input class="w-full pl-12 pr-4 py-4 bg-slate-100/50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 focus:border-primary dark:focus:border-primary rounded-lg outline-none transition-all text-slate-900 dark:text-white placeholder:text-slate-500" placeholder="admin@giovanni.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Contraseña</label>
<a class="text-xs font-bold text-primary hover:text-primary/80 transition-colors uppercase" href="#">Recuperar Contraseña</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full pl-12 pr-12 py-4 bg-slate-100/50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 focus:border-primary dark:focus:border-primary rounded-lg outline-none transition-all text-slate-900 dark:text-white placeholder:text-slate-500" placeholder="••••••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full py-4 bg-primary hover:bg-primary/90 text-background-dark font-extrabold text-base rounded-full shadow-[0_0_30px_rgba(242,185,13,0.3)] hover:shadow-[0_0_40px_rgba(242,185,13,0.5)] transition-all flex items-center justify-center gap-2 uppercase tracking-wide" type="submit">
                    ACCEDER AL PANEL
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Security Section -->
<div class="mt-12 pt-8 border-t border-slate-200/10 dark:border-slate-800/50 w-full text-center">
<div class="flex items-center justify-center gap-2 text-slate-500 dark:text-slate-500 text-xs font-medium uppercase tracking-widest mb-3">
<span class="material-symbols-outlined text-[14px]">verified_user</span>
                    Seguridad
                </div>
<p class="text-slate-500 dark:text-slate-400 text-xs leading-relaxed max-w-[300px] mx-auto">
                    Esta sesión está protegida por encriptación de grado militar y autenticación gestionada por <span class="text-slate-800 dark:text-slate-200 font-bold">Firebase Auth</span>.
                </p>
</div>
</div>
<!-- Support Info -->
<div class="mt-8 text-center text-slate-500 dark:text-slate-500 text-sm">
            ¿Problemas con el acceso? <a class="text-primary hover:underline font-semibold" href="#">Contactar Soporte Técnico</a>
</div>
</main>
<!-- Header Image Hidden or Background Style -->
<div class="hidden">
<div class="w-full bg-center bg-no-repeat bg-cover" data-alt="Interior luxury sports complex training facility" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBkQd_y6hi17pJdxFWXkoU1Lbs7XU-ZJDlRDMR059TWESh_aoPYLERFbsJgXTjwBkxWBAuaRCX9I_vGNzVwvDCOWFvpVfEOi3QVniRAZfvlxMHBdiNLdFQjmaMphqbw7sR2uo_XDw2AjT0qaSgQs9CebrrO1ocOcaLv0RGNU2-NdpamSCUETrXVnZXNz6KmaEwRJHdgDA7lUq7EKxLLrX4HBIWJlBTYIhzoyRoCJ310bqz3s1ubyhT6_pxK1jsjE-KFVzyeCwVrNM4");'>
</div>
</div>
</body></html>
